<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Selamat Idul Fitri</title>

    <link rel="icon" type="image/png" href="assets/images/favicon.ico" />

    <link rel="stylesheet" href="style.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap"
      rel="stylesheet" />
  </head>

  <body>
    <div class="stars"></div>

    <!-- bintang berkedip -->
    <div class="star star1"></div>
    <div class="star star2"></div>
    <div class="star star3"></div>
    <div class="star star4"></div>
    <div class="star star5"></div>
    <div class="star star6"></div>

    <section class="hero">
      <div class="moon"></div>

      <h1>Selamat Hari Raya Idul Fitri</h1>

      <p class="subtitle">Taqabbalallahu minna wa minkum</p>

      <button id="openMessage">Buka Ucapan</button>

      <div class="music-controls">
        <button id="playMusic">▶</button>

        <button id="pauseMusic">⏸</button>
      </div>

      <div id="messageBox" class="message hidden">
        <p>
          Mohon maaf lahir dan batin atas segala kesalahan. Semoga hari yang
          suci ini membawa kedamaian, kebahagiaan, dan keberkahan untuk kita
          semua.
        </p>

        <p class="signature">— Dari Sahabatmu</p>
      </div>
    </section>

    <footer>
      <p>Website dibuat dengan ❤️</p>
    </footer>

    <audio id="bgMusic" loop>
      <source src="assets/music/lebaran.mp3" type="audio/mpeg" />
    </audio>

    <script src="script.js"></script>
  </body>
</html>
